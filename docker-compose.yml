version: "3.9"

services:
  redis: 
    image : redis:latest
    container_name: redis-bodh
    ports:
      - "6379:6379" 
    restart: unless-stopped


  postgres:
    image: postgres:latest
    container_name: postgres-stack
    environment: 
      POSTGRES_USER : postgres
      POSTGRES_PASSWORD : "#Postgress_3000"
      POSTGRES_DB : news
    ports: 
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

    restart: unless-stopped

  dbmate:
    image: amacneil/dbmate:latest
    command: ["up"]   # run migrations on startup
    environment:
      DATABASE_URL: postgres://myuser:mypass@postgres:5432/mydb?sslmode=disable
    depends_on:
      - postgres
    volumes:
      - ./db/migrations:/db/migrations 

  bodhapi: 
    build: .
    container_name: bodhapi-container
    depends_on: 
      - redis 
      - postgres
    ports:                  
      - "5000:5000"
    environment: 
      - REDIS_URL=redis://redis:6379
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS="#Postgress_3000"
      - DB_NAME=news
    command: ["node", "server.js" ]
    restart: always

volumes:
  pg_data:

